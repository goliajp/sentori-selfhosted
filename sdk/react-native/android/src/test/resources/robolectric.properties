# Robolectric ships one Android runtime per API level and only supports
# levels it has shipped. Left to itself it picks the module's targetSdk,
# which the host project sets to whatever the current Expo template
# uses — 35 or 36 — and Robolectric 4.13 has neither, so every test
# fails in the runner before its first line.
#
# Pinned rather than tracking targetSdk: these suites assert on JSON
# shape and file writes, which do not vary by API level, and a test rig
# that breaks whenever the app's target moves is a rig nobody keeps.
sdk=34
