name: SentoriShowcase
options:
  bundleIdPrefix: jp.golia.sentori
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    # Swift 5 language mode keeps the SDK's pre-Swift-6 static
    # mutable state compatible without rewriting it. The showcase
    # app code itself reads cleanly under either mode.
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  SentoriShowcase:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: SentoriShowcase
      # Pure-Swift Sentori classes linked directly (skip the
      # ExpoModulesCore JS bridge — this showcase is a native iOS
      # demo, not an RN host). SentoriModule.swift is intentionally
      # excluded since it's the Expo wrapper.
      - path: ../../sdk/react-native/ios/SentoriCrashHandler.swift
      - path: ../../sdk/react-native/ios/SentoriHangWatchdog.swift
      - path: ../../sdk/react-native/ios/SentoriMobileVitals.swift
      - path: ../../sdk/react-native/ios/SentoriNativeExceptionBridge.swift
      - path: ../../sdk/react-native/ios/SentoriReplayCapture.swift
      - path: ../../sdk/react-native/ios/SentoriScreenshotCapture.swift
      - path: ../../sdk/react-native/ios/SentoriThreadSampler.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.golia.sentori.showcase
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: SentoriShowcase/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
