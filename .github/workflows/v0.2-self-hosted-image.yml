name: v0.2 self-hosted — docker image build + push to GHCR

# Builds sentori-server (the unified main binary) into a docker image
# that anyone can `docker pull` and run. Triggered on master push +
# tagged v0.2 releases. Multi-arch (amd64 + arm64).

on:
  push:
    branches: [master]
    tags: ['v0.2.*']
    paths:
      - 'core/**'
      - 'self-hosted/server/**'
      - 'docker/**'
      - '.github/workflows/v0.2-self-hosted-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sentori-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: self-hosted/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
