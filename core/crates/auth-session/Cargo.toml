# core/crates/auth-session â€” é’˘ç­‹ #2 (per cement-stone).
#
# Session lifecycle + email verification + password reset, composed
# on top of:
#   - K1 sentori-workspace-identity (users + members CRUD)
#   - S9 sentori-cookie-session (SignedCookie wrapping session_id)
#   - S13 sentori-argon2-password (Argon2id hash/verify)
#
# What this crate owns:
#   - Three SQL tables (migration 0002): auth_sessions +
#     email_verifications + password_resets.
#   - `AuthService` â€” one handle wrapping `Identity` + `SecretKey`
#     + the three stores, exposing high-level register/login/
#     verify/forgot/reset/change orchestration methods.
#   - `Session`, `MintedSession`, `EmailVerifyToken`,
#     `PasswordResetToken` domain types (Zeroize-on-Drop where
#     they carry plaintext).
#   - axum module: `require_user` middleware, `CurrentUser`
#     extractor, `build_session_cookie` helper. Hard axum dep
#     (per user decision 2026-06-20).
#
# What this crate does NOT own:
#   - HTTP route bodies / JSON shapes (those live in
#     saas/server/handlers/ and self-hosted/server/handlers/).
#   - Email sending (the K11 notifier crate dispatches the
#     verify/reset links).
#   - Quota / billing checks (K17).
#
# ĺ·Ąč‰ş ceiling-first (per refactor-standards.md Â§2 é’˘ç­‹ tier):
#   - build / test / clippy (-D warnings) / fmt / doc green
#   - integration test covers every public method, happy + 2
#     error paths each (testcontainers postgres:18)
#   - axum middleware unit-tested via tower::ServiceExt::oneshot
#   - line cov > 85% (gate is CI)
#   - full module-level rustdoc on lib.rs
#   - 0 unsafe

