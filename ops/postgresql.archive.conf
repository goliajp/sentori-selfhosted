# Phase 16 sub-C: continuous WAL archiving to Cloudflare R2.
#
# Append these lines to /etc/postgresql/18/main/postgresql.conf on the
# PG VM and `systemctl reload postgresql`. Combined with daily pg_dumps
# (ops/backup.sh) this gives a sub-5-minute RPO via point-in-time
# recovery: restore the latest dump, then replay archived WAL segments
# up to the desired moment.
#
# Prerequisites on the PG VM:
#   - rclone configured with the same `r2:sentori-backups` remote that
#     backup.sh uses
#   - postgres user has read/exec on rclone + access to its config
#     (e.g. ~postgres/.config/rclone/rclone.conf, mode 600)

wal_level = replica
archive_mode = on

# %p = path to the WAL file, %f = its base name. rclone copyto preserves
# the file name in the destination. Logs are visible in the PG log file
# so a failing archive_command pages via the log-tail alert (Phase 16
# sub-B host alerts) before the WAL pile-up exhausts disk.
archive_command = 'rclone copyto %p r2:sentori-backups/wal/%f && echo "%f archived"'

# Cap how long an idle DB sits before flushing a WAL segment to R2.
# 5 minutes bounds the window of un-archived activity even when traffic
# is quiet.
archive_timeout = 300

# Keep at least 256 MB of WAL on disk so a brief R2 outage doesn't
# block writes. (Default 64 MB is too tight for RPO + outage tolerance.)
max_wal_size = 1GB
min_wal_size = 256MB
